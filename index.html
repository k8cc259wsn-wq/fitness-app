<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fitness Tracker iOS Titanium</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-black: #000000; --glass-bg: rgba(28, 28, 30, 0.65); --glass-border: rgba(255, 255, 255, 0.1);
            --text-main: #ffffff; --text-muted: rgba(255, 255, 255, 0.6);
            --apple-green: #32d74b; --apple-blue: #0a84ff; --apple-orange: #ff9f0a; --apple-purple: #bf5af2;
            --apple-red: #ff453a;
        }

        body { font-family: -apple-system, sans-serif; background-color: var(--bg-black); color: var(--text-main); margin: 0; padding: 20px 15px 50px 15px; overflow-x: hidden; }

        .ambient-orb-1 { position: fixed; top: -50px; left: -50px; width: 250px; height: 250px; background: var(--apple-blue); border-radius: 50%; filter: blur(100px); opacity: 0.35; z-index: -1; }
        .ambient-orb-2 { position: fixed; bottom: 50px; right: -50px; width: 300px; height: 300px; background: var(--apple-purple); border-radius: 50%; filter: blur(120px); opacity: 0.25; z-index: -1; }

        .header { display: flex; justify-content: space-between; align-items: center; margin: 10px 0 20px 0; }
        .header h1 { margin: 0; font-size: 26px; font-weight: 800; }
        .streak { background: rgba(255, 159, 10, 0.15); border: 1px solid rgba(255, 159, 10, 0.3); padding: 6px 12px; border-radius: 20px; font-weight: 700; font-size: 14px; color: var(--apple-orange); backdrop-filter: blur(10px); }

        .card { background: var(--glass-bg); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid var(--glass-border); border-radius: 22px; padding: 18px; margin-bottom: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h2 { margin-top: 0; font-size: 18px; font-weight: 700; margin-bottom: 15px; display: flex; align-items: center; gap: 8px; }

        input[type="number"] { width: 100%; box-sizing: border-box; padding: 12px; border: 1px solid var(--glass-border); border-radius: 12px; background: rgba(255, 255, 255, 0.05); color: var(--text-main); font-size: 16px; margin-bottom: 10px; }
        input[type="number"]:focus { outline: none; border-color: var(--apple-blue); background: rgba(10, 132, 255, 0.1); }
        
        .input-row { display: flex; gap: 10px; margin-bottom: 10px; }

        button { width: 100%; padding: 14px; background: linear-gradient(135deg, #32d74b 0%, #28a745 100%); color: white; border: none; border-radius: 12px; font-size: 16px; font-weight: 700; cursor: pointer; transition: 0.2s; }
        button:active { transform: scale(0.97); }
        button:disabled { background: rgba(255, 255, 255, 0.1); color: var(--text-muted); cursor: not-allowed; transform: none; }
        .btn-blue { background: linear-gradient(135deg, #0a84ff 0%, #0066cc 100%); }

        canvas { width: 100% !important; height: 180px !important; }
        ul { padding-left: 20px; margin: 0 0 15px 0; color: var(--text-muted); line-height: 1.6; }
        li span { color: var(--text-main); font-weight: 500; }

        .heatmap-container { display: flex; justify-content: space-between; gap: 6px; }
        .day-box { flex: 1; aspect-ratio: 1; border-radius: 8px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: bold; color: var(--text-muted); }
        .day-box.active { background: var(--apple-green); color: var(--bg-black); box-shadow: 0 0 10px rgba(50, 215, 75, 0.4); border: none; }
        
        .timer-display { font-size: 42px; font-weight: 800; text-align: center; color: var(--apple-orange); font-variant-numeric: tabular-nums; margin: 5px 0; text-shadow: 0 0 15px rgba(255, 159, 10, 0.4); }
        .timer-controls { display: flex; gap: 8px; margin-bottom: 15px; }
        .timer-btn { background: rgba(255, 159, 10, 0.2); color: var(--apple-orange); padding: 8px; font-size: 13px; border-radius: 8px; flex: 1; text-align: center; font-weight: bold; border: 1px solid rgba(255, 159, 10, 0.3); }

        .water-container { display: flex; justify-content: space-between; margin-top: 5px; }
        .water-drop { font-size: 24px; opacity: 0.3; transition: 0.3s; cursor: pointer; filter: grayscale(100%); }
        .water-drop.filled { opacity: 1; filter: grayscale(0%); text-shadow: 0 0 10px rgba(10, 132, 255, 0.5); transform: scale(1.1); }

        .macro-box { margin-bottom: 12px; }
        .macro-header { display: flex; justify-content: space-between; font-size: 13px; font-weight: bold; margin-bottom: 4px; }
        .macro-bar-bg { width: 100%; height: 8px; background: rgba(255,255,255,0.1); border-radius: 4px; overflow: hidden; }
        .macro-bar-fill { height: 100%; border-radius: 4px; transition: width 0.5s ease; width: 0%; }
        
        .c-cal { color: var(--apple-red); } .bg-cal { background: var(--apple-red); box-shadow: 0 0 8px var(--apple-red); }
        .c-pro { color: var(--apple-green); } .bg-pro { background: var(--apple-green); box-shadow: 0 0 8px var(--apple-green); }
        .c-fat { color: var(--apple-orange); } .bg-fat { background: var(--apple-orange); box-shadow: 0 0 8px var(--apple-orange); }
        .c-crb { color: var(--apple-blue); } .bg-crb { background: var(--apple-blue); box-shadow: 0 0 8px var(--apple-blue); }

        .cloud-status { font-size: 11px; color: var(--text-muted); text-align: center; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="ambient-orb-1"></div>
    <div class="ambient-orb-2"></div>

    <div class="header">
        <h1>Tracker PRO</h1>
        <div class="streak" id="streakDisplay">🔥 0</div>
    </div>

    <div class="card">
        <h2>🗓 Тренировки</h2>
        <div class="heatmap-container" id="heatmap"></div>
    </div>

    <div class="card">
        <h2>💧 Вода (Норма: 8 стаканов)</h2>
        <div class="water-container" id="waterBox"></div>
    </div>

    <div class="card">
        <h2>🥩 Питание (Цели на рост)</h2>
        <div class="input-row">
            <input type="number" id="inpCal" placeholder="Ккал (2500)" inputmode="decimal">
            <input type="number" id="inpPro" placeholder="Белок (130г)" inputmode="decimal">
        </div>
        <div class="input-row">
            <input type="number" id="inpFat" placeholder="Жиры (80г)" inputmode="decimal">
            <input type="number" id="inpCrb" placeholder="Угли (300г)" inputmode="decimal">
        </div>
        <button class="btn-blue" style="margin-bottom:15px; padding: 10px;" onclick="saveMacros()">Записать еду</button>
        
        <div class="macro-box">
            <div class="macro-header c-cal"><span>Калории</span><span id="txtCal">0 / 2500</span></div>
            <div class="macro-bar-bg"><div class="macro-bar-fill bg-cal" id="barCal"></div></div>
        </div>
        <div class="macro-box">
            <div class="macro-header c-pro"><span>Белок</span><span id="txtPro">0 / 130g</span></div>
            <div class="macro-bar-bg"><div class="macro-bar-fill bg-pro" id="barPro"></div></div>
        </div>
        <div class="macro-box">
            <div class="macro-header c-fat"><span>Жиры</span><span id="txtFat">0 / 80g</span></div>
            <div class="macro-bar-bg"><div class="macro-bar-fill bg-fat" id="barFat"></div></div>
        </div>
        <div class="macro-box">
            <div class="macro-header c-crb"><span>Углеводы</span><span id="txtCrb">0 / 300g</span></div>
            <div class="macro-bar-bg"><div class="macro-bar-fill bg-crb" id="barCrb"></div></div>
        </div>
    </div>

    <div class="card">
        <h2>⚖️ Вес (Цель: 75 кг)</h2>
        <div class="input-row">
            <input type="number" id="weightInput" placeholder="Текущий вес" step="0.1" inputmode="decimal">
            <button id="weightBtn" class="btn-blue" style="width: 50%;" onclick="saveWeight()">Записать</button>
        </div>
        <canvas id="weightChart"></canvas>
    </div>

    <div class="card">
        <h2>📏 Замеры объемов (см)</h2>
        <div class="input-row">
            <input type="number" id="inpBicep" placeholder="Бицепс" inputmode="decimal">
            <input type="number" id="inpChest" placeholder="Грудь" inputmode="decimal">
            <input type="number" id="inpWaist" placeholder="Талия" inputmode="decimal">
        </div>
        <button class="btn-blue" style="padding: 10px;" onclick="saveMeasurements()">Сохранить замеры</button>
    </div>

    <div class="card">
        <h2>⏱ Умный таймер</h2>
        <div class="timer-display" id="timer">01:00</div>
        <div class="timer-controls">
            <div class="timer-btn" onclick="adjTimer(-15)">-15с</div>
            <div class="timer-btn" onclick="adjTimer(15)">+15с</div>
            <div class="timer-btn" onclick="setTimer(30)">30с</div>
            <div class="timer-btn" onclick="setTimer(90)">90с</div>
        </div>
        <button onclick="startTimer()" style="background: linear-gradient(135deg, #ff9f0a 0%, #d88300 100%);">Старт</button>
    </div>

    <div class="card">
        <h2>💪 Тренировка</h2>
        <ul id="workoutPlan"></ul>
        <button id="workoutBtn" onclick="completeWorkout()">Тренировка выполнена</button>
    </div>

    <div class="cloud-status" id="cloudStatus">📱 Загрузка...</div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();

        let todayStr = new Date().toDateString();
        function triggerVibration(style = 'medium') { if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred(style); }

        let appData = {
            streak: 0, weightData: [61.0], weightLabels: ['Старт'], activityHistory: [],
            lastWeightDate: '', lastWorkoutDate: '', lastResetDate: '',
            water: 0, macros: { cal: 0, pro: 0, fat: 0, crb: 0 },
            meas: { bicep: '', chest: '', waist: '' }
        };

        // БЕЗОПАСНАЯ ЗАГРУЗКА (Гибрид)
        function safeLoad() {
            try {
                let local = localStorage.getItem('fit_pro_safe');
                if (local) appData = JSON.parse(local);
                
                if (tg.CloudStorage && tg.CloudStorage.getItem) {
                    tg.CloudStorage.getItem('fit_pro_safe', (err, val) => {
                        if (!err && val) {
                            appData = JSON.parse(val);
                            document.getElementById('cloudStatus').innerHTML = '☁️ Облако активно';
                        } else {
                            document.getElementById('cloudStatus').innerHTML = '📱 Работает локально';
                        }
                        finalizeLoad();
                    });
                } else {
                    document.getElementById('cloudStatus').innerHTML = '📱 Работает локально';
                    finalizeLoad();
                }
            } catch(e) {
                document.getElementById('cloudStatus').innerHTML = '📱 Работает локально';
                finalizeLoad();
            }
        }

        function finalizeLoad() {
            if (appData.lastResetDate !== todayStr) {
                appData.water = 0; appData.macros = { cal: 0, pro: 0, fat: 0, crb: 0 };
                appData.lastResetDate = todayStr;
                safeSync();
            }
            initUI();
        }

        // БЕЗОПАСНОЕ СОХРАНЕНИЕ
        function safeSync() {
            let dataStr = JSON.stringify(appData);
            localStorage.setItem('fit_pro_safe', dataStr); // Всегда сохраняем в телефон мгновенно
            
            try {
                if (tg.CloudStorage && tg.CloudStorage.setItem) {
                    tg.CloudStorage.setItem('fit_pro_safe', dataStr, (err, success) => {
                        if(success) document.getElementById('cloudStatus').innerHTML = '☁️ Облако обновлено ✔️';
                    });
                }
            } catch(e) {}
        }

        let chart;
        function initUI() {
            document.getElementById('streakDisplay').innerText = `🔥 ${appData.streak}`;
            renderHeatmap(); renderWater(); renderMacros(); checkLocks();

            document.getElementById('inpBicep').value = appData.meas.bicep || '';
            document.getElementById('inpChest').value = appData.meas.chest || '';
            document.getElementById('inpWaist').value = appData.meas.waist || '';

            const ctx = document.getElementById('weightChart').getContext('2d');
            let gradient = ctx.createLinearGradient(0, 0, 0, 180);
            gradient.addColorStop(0, 'rgba(10, 132, 255, 0.4)'); gradient.addColorStop(1, 'rgba(10, 132, 255, 0.0)');
            
            if(chart) chart.destroy();
            chart = new Chart(ctx, {
                type: 'line', data: { labels: appData.weightLabels, datasets: [
                    { label: 'Вес', data: appData.weightData, borderColor: '#0a84ff', backgroundColor: gradient, borderWidth: 3, pointBackgroundColor: '#fff', fill: true, tension: 0.4 },
                    { label: 'Цель', data: Array(appData.weightLabels.length).fill(75), borderColor: '#32d74b', borderDash: [6,6], borderWidth: 2, fill: false }
                ]}, options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { min: 60, max: 80 } } }
            });

            let ul = document.getElementById('workoutPlan'); ul.innerHTML = '';
            const bonusReps = Math.floor(appData.streak / 7) * 2;
            const workouts = [
                [{n: "Отжимания от пола", sets: 4, reps: 12}, {n: "Скручивания", sets: 3, reps: 20}, {n: "Приседания", sets: 4, reps: 20}],
                [{n: "Подтягивания / Тяга", sets: 4, reps: 8}, {n: "Отжимания узким", sets: 3, reps: 12}, {n: "Выпады", sets: 3, reps: 15}]
            ];
            let currentDayPlan = new Date().getDay() % 3;
            if (currentDayPlan === 2) { ul.innerHTML = "<li><span>День отдыха</span></li><li><span>Растяжка</span></li>"; } 
            else { workouts[currentDayPlan].forEach(ex => { let li = document.createElement('li'); li.innerHTML = `<span>${ex.n}:</span> ${ex.sets}х${ex.reps + bonusReps}`; ul.appendChild(li); }); }
        }

        function checkLocks() {
            if (appData.lastWeightDate === todayStr) { let wBtn = document.getElementById('weightBtn'); wBtn.disabled = true; wBtn.innerText = '✓'; }
            if (appData.lastWorkoutDate === todayStr) { let woBtn = document.getElementById('workoutBtn'); woBtn.disabled = true; woBtn.innerText = '✓ Выполнено'; }
        }

        function renderWater() {
            let box = document.getElementById('waterBox'); box.innerHTML = '';
            for(let i=1; i<=8; i++) {
                let d = document.createElement('div'); d.className = `water-drop ${i <= appData.water ? 'filled' : ''}`; d.innerText = '💧';
                d.onclick = () => { triggerVibration('light'); appData.water = i; safeSync(); renderWater(); };
                box.appendChild(d);
            }
        }

        function saveMacros() {
            triggerVibration('medium');
            let c = parseInt(document.getElementById('inpCal').value) || 0; let p = parseInt(document.getElementById('inpPro').value) || 0;
            let f = parseInt(document.getElementById('inpFat').value) || 0; let cb = parseInt(document.getElementById('inpCrb').value) || 0;
            appData.macros.cal += c; appData.macros.pro += p; appData.macros.fat += f; appData.macros.crb += cb;
            document.getElementById('inpCal').value = ''; document.getElementById('inpPro').value = ''; document.getElementById('inpFat').value = ''; document.getElementById('inpCrb').value = '';
            safeSync(); renderMacros();
        }

        function renderMacros() {
            let m = appData.macros;
            document.getElementById('txtCal').innerText = `${m.cal}/2500`; document.getElementById('barCal').style.width = `${Math.min((m.cal/2500)*100, 100)}%`;
            document.getElementById('txtPro').innerText = `${m.pro}/130g`; document.getElementById('barPro').style.width = `${Math.min((m.pro/130)*100, 100)}%`;
            document.getElementById('txtFat').innerText = `${m.fat}/80g`;  document.getElementById('barFat').style.width = `${Math.min((m.fat/80)*100, 100)}%`;
            document.getElementById('txtCrb').innerText = `${m.crb}/300g`; document.getElementById('barCrb').style.width = `${Math.min((m.crb/300)*100, 100)}%`;
        }

        function saveMeasurements() {
            triggerVibration('heavy');
            appData.meas.bicep = document.getElementById('inpBicep').value; appData.meas.chest = document.getElementById('inpChest').value; appData.meas.waist = document.getElementById('inpWaist').value;
            safeSync(); tg.showAlert('Замеры сохранены!');
        }

        let timerTime = 60; let timerInterval;
        function updateTimerDisplay() { let m = Math.floor(timerTime / 60); let s = timerTime % 60; document.getElementById('timer').innerText = `0${m}:${s < 10 ? '0' : ''}${s}`; }
        function adjTimer(secs) { triggerVibration('light'); timerTime += secs; if(timerTime < 5) timerTime = 5; updateTimerDisplay(); }
        function setTimer(secs) { triggerVibration('light'); timerTime = secs; updateTimerDisplay(); }
        
        function startTimer() {
            clearInterval(timerInterval); triggerVibration('medium');
            timerInterval = setInterval(() => {
                timerTime--; updateTimerDisplay();
                if (timerTime <= 0) { clearInterval(timerInterval); timerTime = 60; updateTimerDisplay(); triggerVibration('heavy'); if(tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success'); tg.showAlert('Подход! Погнали!'); }
            }, 1000);
        }

        function renderHeatmap() {
            let container = document.getElementById('heatmap'); container.innerHTML = '';
            for(let i = 6; i >= 0; i--) {
                let d = new Date(); d.setDate(d.getDate() - i);
                let box = document.createElement('div');
                box.className = `day-box ${appData.activityHistory.includes(d.toDateString()) ? 'active' : ''}`;
                box.innerText = ['Вс','Пн','Вт','Ср','Чт','Пт','Сб'][d.getDay()];
                container.appendChild(box);
            }
        }

        function saveWeight() {
            let val = document.getElementById('weightInput').value; if(!val) return;
            triggerVibration('heavy');
            appData.weightLabels.push(`${new Date().getDate()}.${new Date().getMonth()+1}`);
            appData.weightData.push(parseFloat(val));
            if (appData.weightLabels.length > 10) { appData.weightLabels.shift(); appData.weightData.shift(); }
            appData.lastWeightDate = todayStr;
            safeSync(); initUI(); tg.showAlert('Вес зафиксирован!');
        }

        function completeWorkout() {
            triggerVibration('rigid'); appData.streak++;
            if(!appData.activityHistory.includes(todayStr)) appData.activityHistory.push(todayStr);
            appData.lastWorkoutDate = todayStr;
            safeSync(); initUI(); tg.showAlert('Машина! Тренировка засчитана.');
        }

        safeLoad(); // Запускаем гибридную загрузку
    </script>
</body>
</html>

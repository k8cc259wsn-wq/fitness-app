<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fitness Tracker PRO</title>
    <!-- Telegram Web App SDK -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <!-- Библиотека для графика -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-color: var(--tg-theme-bg-color, #1c1c1e);
            --text-color: var(--tg-theme-text-color, #ffffff);
            --btn-color: var(--tg-theme-button-color, #0a84ff);
            --btn-text-color: var(--tg-theme-button-text-color, #ffffff);
            --card-bg: var(--tg-theme-secondary-bg-color, #2c2c2e);
            --accent: #32d74b;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            padding-bottom: 40px;
        }

        /* Анимация появления */
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            animation: slideUp 0.5s ease-out;
        }

        .header h1 { margin: 0; font-size: 24px; }
        .streak {
            background: var(--card-bg);
            padding: 8px 12px;
            border-radius: 15px;
            font-weight: bold;
            color: #ff9f0a;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .card {
            background-color: var(--card-bg);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            animation: slideUp 0.6s ease-out backwards;
        }
        
        .card:nth-child(2) { animation-delay: 0.1s; }
        .card:nth-child(3) { animation-delay: 0.2s; }
        .card:nth-child(4) { animation-delay: 0.3s; }

        h2 { margin-top: 0; font-size: 18px; color: var(--btn-color); }

        input[type="number"] {
            width: calc(100% - 24px);
            padding: 12px;
            border: 2px solid #3a3a3c;
            border-radius: 10px;
            background: var(--bg-color);
            color: var(--text-color);
            font-size: 16px;
            margin-bottom: 10px;
            transition: border-color 0.3s;
        }

        input[type="number"]:focus {
            outline: none;
            border-color: var(--btn-color);
        }

        button {
            width: 100%;
            padding: 14px;
            background-color: var(--btn-color);
            color: var(--btn-text-color);
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.1s, opacity 0.3s;
        }

        button:active {
            transform: scale(0.96);
            opacity: 0.8;
        }

        .workout-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .workout-list li {
            padding: 10px 0;
            border-bottom: 1px solid #3a3a3c;
            display: flex;
            justify-content: space-between;
        }

        .workout-list li:last-child { border-bottom: none; }
        
        canvas {
            width: 100% !important;
            height: 200px !important;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>Дневник Прогресса</h1>
        <div class="streak" id="streakDisplay">🔥 0 дней</div>
    </div>

    <!-- Блок ввода веса -->
    <div class="card">
        <h2>⚖️ Твой вес сегодня</h2>
        <input type="number" id="weightInput" placeholder="Например: 61.5" step="0.1">
        <button onclick="saveWeight()">Сохранить вес</button>
    </div>

    <!-- График прогресса -->
    <div class="card">
        <h2>📈 График набора (Цель: 75 кг)</h2>
        <canvas id="weightChart"></canvas>
    </div>

    <!-- Питание -->
    <div class="card">
        <h2>🥩 Питание (Цель: 2500 ккал)</h2>
        <input type="number" id="caloriesInput" placeholder="Съедено ккал за день">
        <input type="number" id="proteinInput" placeholder="Грамм белка (нужно 100-120г)">
        <button onclick="saveNutrition()">Сохранить рацион</button>
    </div>

    <!-- Тренировка -->
    <div class="card">
        <h2>💪 Тренировка на сегодня</h2>
        <ul class="workout-list" id="workoutPlan">
            <!-- Заполняется скриптом -->
        </ul>
        <button style="margin-top: 15px; background-color: var(--accent);" onclick="completeWorkout()">Тренировка выполнена!</button>
    </div>

    <script>
        // Инициализация Telegram
        let tg = window.Telegram.WebApp;
        tg.expand(); // Разворачиваем на весь экран
        tg.ready();

        // Функция тактильной отдачи
        function triggerVibration(style = 'medium') {
            if (tg.HapticFeedback) {
                tg.HapticFeedback.impactOccurred(style);
            }
        }

        // Логика Стриков (дней подряд)
        function updateStreak() {
            let today = new Date().toDateString();
            let lastLogin = localStorage.getItem('lastLogin');
            let streak = parseInt(localStorage.getItem('streak') || '0');

            if (lastLogin !== today) {
                let yesterday = new Date();
                yesterday.setDate(yesterday.getDate() - 1);
                
                if (lastLogin === yesterday.toDateString()) {
                    streak++; // Зашел на следующий день
                } else if (lastLogin !== null) {
                    streak = 1; // Пропустил день, сброс
                } else {
                    streak = 1; // Первый вход
                }
                localStorage.setItem('lastLogin', today);
                localStorage.setItem('streak', streak.toString());
            }
            document.getElementById('streakDisplay').innerText = `🔥 ${streak} дней`;
        }
        updateStreak();

        // Инициализация данных веса
        let weightData = JSON.parse(localStorage.getItem('weightData')) || [61.0]; // Начинаем с 61
        let weightLabels = JSON.parse(localStorage.getItem('weightLabels')) || ['Старт'];

        // Настройка графика Chart.js
        const ctx = document.getElementById('weightChart').getContext('2d');
        let chart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: weightLabels,
                datasets: [
                    {
                        label: 'Твой вес (кг)',
                        data: weightData,
                        borderColor: '#0a84ff',
                        backgroundColor: 'rgba(10, 132, 255, 0.2)',
                        borderWidth: 3,
                        pointBackgroundColor: '#ffffff',
                        pointRadius: 4,
                        fill: true,
                        tension: 0.3
                    },
                    {
                        label: 'Цель',
                        data: Array(weightLabels.length).fill(75),
                        borderColor: '#32d74b',
                        borderWidth: 2,
                        borderDash: [5, 5],
                        pointRadius: 0,
                        fill: false
                    }
                ]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: { legend: { display: false } },
                scales: {
                    y: { 
                        min: 60, 
                        max: 80,
                        grid: { color: 'rgba(255,255,255,0.1)' }
                    },
                    x: { grid: { display: false } }
                }
            }
        });

        // Сохранение веса
        function saveWeight() {
            let val = document.getElementById('weightInput').value;
            if(!val) return;
            
            triggerVibration('heavy'); // Вибрация

            let now = new Date();
            let dateStr = `${now.getDate()}.${now.getMonth()+1}`;
            
            weightLabels.push(dateStr);
            weightData.push(parseFloat(val));
            
            // Оставляем только последние 10 записей на графике
            if (weightLabels.length > 10) {
                weightLabels.shift();
                weightData.shift();
            }

            localStorage.setItem('weightData', JSON.stringify(weightData));
            localStorage.setItem('weightLabels', JSON.stringify(weightLabels));

            // Обновляем линию цели и сам график
            chart.data.datasets[1].data = Array(weightLabels.length).fill(75);
            chart.update();
            
            document.getElementById('weightInput').value = '';
            tg.showAlert('Вес успешно сохранен! Так держать!');
        }

        // Сохранение питания
        function saveNutrition() {
            triggerVibration('light');
            let cal = document.getElementById('caloriesInput').value;
            let pro = document.getElementById('proteinInput').value;
            if(cal && pro) {
                tg.showAlert(`Записано: ${cal} ккал и ${pro}г белка. Масса растет!`);
            }
        }

        // Логика тренировок (меняется каждый день)
        const workouts = [
            ["Отжимания от пола: 4х12", "Скручивания на пресс: 3х20", "Приседания: 4х20"],
            ["Подтягивания (или тяга в наклоне): 4х8", "Отжимания узким хватом: 3х12", "Выпады: 3х15 на ногу"],
            ["Отдых и восстановление!", "Растяжка 15 минут", "Хорошо поесть и поспать"]
        ];
        
        let dayIndex = new Date().getDay() % 3; // Простая ротация
        let ul = document.getElementById('workoutPlan');
        workouts[dayIndex].forEach(ex => {
            let li = document.createElement('li');
            li.innerHTML = `<span>${ex}</span> <input type="checkbox">`;
            ul.appendChild(li);
        });

        function completeWorkout() {
            triggerVibration('rigid');
            tg.showAlert('Тренировка завершена! Ты стал на шаг ближе к 75 кг.');
        }
    </script>
</body>
</html>

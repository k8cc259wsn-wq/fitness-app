<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MassGainer Pro</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg-color: var(--tg-theme-bg-color, #f2f2f7);
            --card-bg: var(--tg-theme-secondary-bg-color, #ffffff);
            --text-main: var(--tg-theme-text-color, #000000);
            --text-hint: var(--tg-theme-hint-color, #8e8e93);
            --accent: var(--tg-theme-button-color, #007aff);
            --accent-light: rgba(0, 122, 255, 0.1);
        }
        
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background-color: var(--bg-color); color: var(--text-main); margin: 0; padding: 20px 15px 100px 15px; }
        
        /* Typography */
        h1 { font-size: 28px; font-weight: 800; margin: 0 0 5px 0; letter-spacing: -0.5px; }
        h2 { font-size: 18px; font-weight: 700; margin: 0 0 15px 0; }
        .subtitle { font-size: 14px; color: var(--text-hint); margin-bottom: 20px; }
        
        /* Cards */
        .card { background: var(--card-bg); border-radius: 20px; padding: 20px; margin-bottom: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.03); }
        
        /* Progress Bar */
        .progress-container { width: 100%; background: #e5e5ea; border-radius: 10px; height: 12px; overflow: hidden; margin-top: 10px; }
        .progress-fill { height: 100%; background: var(--accent); border-radius: 10px; transition: width 0.5s ease; }
        .progress-labels { display: flex; justify-content: space-between; font-size: 12px; color: var(--text-hint); margin-top: 5px; font-weight: 600; }

        /* Inputs */
        .input-group { display: flex; align-items: center; gap: 10px; margin-top: 10px; }
        input[type="number"] { flex: 1; padding: 12px 15px; border-radius: 12px; border: 1px solid #d1d1d6; background: transparent; color: var(--text-main); font-size: 16px; outline: none; transition: 0.2s; }
        input[type="number"]:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-light); }
        
        /* Workout List */
        .task { display: flex; align-items: center; padding: 12px 0; border-bottom: 1px solid rgba(0,0,0,0.05); transition: 0.3s; }
        .task:last-child { border-bottom: none; }
        .task-info { flex: 1; }
        .task-title { font-weight: 600; font-size: 16px; margin-bottom: 3px; transition: 0.3s; }
        .task-desc { font-size: 13px; color: var(--text-hint); }
        
        /* Custom Checkbox */
        .checkbox { width: 26px; height: 26px; border-radius: 50%; border: 2px solid #c7c7cc; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.2s; }
        .task.completed .checkbox { background: var(--accent); border-color: var(--accent); }
        .task.completed .checkbox::after { content: '✓'; color: white; font-weight: bold; font-size: 14px; }
        .task.completed .task-title { color: var(--text-hint); text-decoration: line-through; }
        
        /* Floating Button */
        .btn-floating { position: fixed; bottom: 20px; left: 20px; right: 20px; background: var(--accent); color: white; border: none; padding: 16px; border-radius: 16px; font-size: 17px; font-weight: 600; box-shadow: 0 10px 20px var(--accent-light); cursor: pointer; transition: transform 0.1s; }
        .btn-floating:active { transform: scale(0.98); }
    </style>
</head>
<body>

    <h1>Привет, Чемпион!</h1>
    <div class="subtitle" id="date-display">Загрузка даты...</div>

    <div class="card">
        <h2>⚖️ Твой прогресс массы</h2>
        <div class="input-group">
            <input type="number" id="current-weight" placeholder="Введи вес сегодня, кг" oninput="updateWeightProgress()">
        </div>
        <div class="progress-container">
            <div class="progress-fill" id="weight-bar" style="width: 0%;"></div>
        </div>
        <div class="progress-labels">
            <span>Старт: 61 кг</span>
            <span>Цель: 75 кг</span>
        </div>
    </div>

    <div class="card">
        <h2>🍎 Калории (Профицит)</h2>
        <div class="input-group">
            <input type="number" id="calories-eaten" placeholder="Съедено ккал" oninput="updateCalorieProgress()">
        </div>
        <div class="progress-container">
            <div class="progress-fill" id="calories-bar" style="width: 0%; background: #34c759;"></div>
        </div>
        <div class="progress-labels">
            <span id="cal-count">0 ккал</span>
            <span>Норма: 2500 ккал</span>
        </div>
    </div>

    <div class="card">
        <h2>💪 Тренировка на сегодня</h2>
        <div id="workout-list"></div>
    </div>

    <button class="btn-floating" onclick="finishDay()">Завершить день</button>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        // Установка текущей даты
        const options = { weekday: 'long', month: 'long', day: 'numeric' };
        document.getElementById('date-display').innerText = new Date().toLocaleDateString('ru-RU', options);

        // Программы тренировок (только пол/свой вес)
        const workouts = {
            1: [{t: "Отжимания от пола", d: "4 подхода по 15 раз"}, {t: "Планка", d: "3 подхода по 1 мин"}, {t: "Приседания", d: "4 подхода по 20 раз"}],
            2: [{t: "Алмазные отжимания", d: "4 подхода по 10 раз"}, {t: "Выпады", d: "3 подхода по 15 раз на ногу"}, {t: "Скручивания на пресс", d: "3 подхода по 20 раз"}],
            3: [{t: "Широкие отжимания", d: "4 подхода по 12 раз"}, {t: "Ягодичный мостик", d: "3 подхода по 20 раз"}, {t: "Подъем ног лежа", d: "3 подхода по 15 раз"}],
            4: [{t: "Активный отдых", d: "Растяжка всего тела 15 минут"}],
            5: [{t: "Взрывные отжимания", d: "3 подхода по 10 раз"}, {t: "Приседания с выпрыгиванием", d: "3 подхода по 15 раз"}, {t: "Планка", d: "3 подхода по 1 мин"}],
            6: [{t: "Берпи", d: "3 подхода по 10 раз"}, {t: "Отжимания 'домиком' (плечи)", d: "3 подхода по 12 раз"}, {t: "Велосипед на пресс", d: "3 подхода по 30 сек"}],
            0: [{t: "День восстановления", d: "Хороший сон и фокус на еде"}]
        };

        const currentDay = new Date().getDay();
        const todayWorkout = workouts[currentDay];
        const workoutContainer = document.getElementById('workout-list');

        // Рендер тренировки с учетом сохраненных галочек
        todayWorkout.forEach((ex, index) => {
            const isChecked = localStorage.getItem(`day${currentDay}-ex${index}`) === 'true';
            
            const taskDiv = document.createElement('div');
            taskDiv.className = `task ${isChecked ? 'completed' : ''}`;
            taskDiv.innerHTML = `
                <div class="task-info">
                    <div class="task-title">${ex.t}</div>
                    <div class="task-desc">${ex.d}</div>
                </div>
                <div class="checkbox"></div>
            `;
            
            taskDiv.onclick = () => {
                taskDiv.classList.toggle('completed');
                localStorage.setItem(`day${currentDay}-ex${index}`, taskDiv.classList.contains('completed'));
            };
            
            workoutContainer.appendChild(taskDiv);
        });

        // Загрузка сохраненных данных при входе
        window.onload = () => {
            document.getElementById('current-weight').value = localStorage.getItem('savedWeight') || '';
            document.getElementById('calories-eaten').value = localStorage.getItem('savedCalories') || '';
            updateWeightProgress();
            updateCalorieProgress();
        };

        // Логика прогресс-бара веса
        function updateWeightProgress() {
            let val = parseFloat(document.getElementById('current-weight').value);
            if (val) {
                localStorage.setItem('savedWeight', val);
                let progress = ((val - 61) / (75 - 61)) * 100;
                if (progress < 0) progress = 0;
                if (progress > 100) progress = 100;
                document.getElementById('weight-bar').style.width = progress + '%';
            }
        }

        // Логика прогресс-бара калорий
        function updateCalorieProgress() {
            let val = parseFloat(document.getElementById('calories-eaten').value);
            if (val) {
                localStorage.setItem('savedCalories', val);
                let progress = (val / 2500) * 100;
                if (progress > 100) progress = 100;
                document.getElementById('calories-bar').style.width = progress + '%';
                document.getElementById('cal-count').innerText = val + ' ккал';
            }
        }

        // Отправка в бота
        function finishDay() {
            const weight = document.getElementById('current-weight').value || "не указан";
            const cal = document.getElementById('calories-eaten').value || "0";
            tg.sendData(`📈 Отчет за день!\nВес: ${weight} кг\nКалории: ${cal}/2500 ккал\nТренировка закрыта.`);
            tg.close();
        }
    </script>
</body>
</html>
